{{- with .Site.Params.env }}
<meta name="color-scheme" content="light dark" />
{{ end }}

{{- /* Include extended head partials */ -}}
{{- partial "head_custom.html" . }}

{{- if (eq .Site.Params.env "production") | and .Site.Params.analytics.google }}
{{- template "_internal/google_analytics.html" . }}
{{ end }}

<style>
  /* Core custom styles for Nous Research aesthetic */
  :root {
    --color-primary: #0a0a0a;
    --color-neutral: #666666;
    --color-light: #e8e8e8;
    --color-lighter: #f5f5f5;
    --color-accent: #0066cc;
    --font-family-primary: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", system-ui, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-primary: #f0f0f0;
      --color-neutral: #999999;
      --color-light: #333333;
      --color-lighter: #1a1a1a;
    }
  }
</style>
